<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuizStage - Fixed</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, get, push, child, onChildAdded }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAHzOFMSjWelS2llpZVh4Ts83mD9qe10m4",
  authDomain: "game-night-808f1.firebaseapp.com",
  databaseURL: "https://game-night-808f1-default-rtdb.firebaseio.com",
  projectId: "game-night-808f1",
  storageBucket: "game-night-808f1.firebasestorage.app",
  messagingSenderId: "730427931065",
  appId: "1:730427931065:web:f94ae3ac0b52bea1019e68",
  measurementId: "G-SENJVBZW37"
};

function sanitiseKey(s){ return String(s).replace(/[.#$\[\]/]/g, '_'); }

let _db, _gameRef, _playersRef;
let _fbReady = false;

try {
  const app = initializeApp(firebaseConfig);
  _db = getDatabase(app);
  _gameRef = ref(_db, 'quizstage/game');
  _playersRef = ref(_db, 'quizstage/players');
  _fbReady = true;
} catch(e) { console.error('Firebase init error:', e); }

window._fb = {
  ready: () => _fbReady,
  pushGame: (obj) => _fbReady ? set(_gameRef, obj) : Promise.resolve(),
  onGame: (cb) => _fbReady ? onValue(_gameRef, snap => cb(snap.val())) : () => {},
  onPlayers: (cb) => _fbReady ? onValue(_playersRef, snap => { const v=snap.val(); cb(v ? Object.values(v) : []); }) : () => {},
  updatePlayer: (name, data) => _fbReady ? set(ref(_db, 'quizstage/players/' + sanitiseKey(name)), { ...data, name }) : Promise.resolve(),
  
  // WebRTC Signaling
  webrtcSetPresence: (player, live) => live ? set(ref(_db, `quizstage/webrtc/${sanitiseKey(player)}/present`), true) : remove(ref(_db, `quizstage/webrtc/${sanitiseKey(player)}/present`)),
  webrtcSendOffer: (player, offer) => set(child(ref(_db, `quizstage/webrtc/${sanitiseKey(player)}`), 'offer'), offer),
  webrtcSendAnswer: (player, answer) => set(child(ref(_db, `quizstage/webrtc/${sanitiseKey(player)}`), 'answer'), answer),
  webrtcAddCandidate: (player, side, cand) => push(child(ref(_db, `quizstage/webrtc/${sanitiseKey(player)}`), side), cand),
  webrtcOnOffer: (player, cb) => onValue(child(ref(_db, `quizstage/webrtc/${sanitiseKey(player)}`), 'offer'), snap => { if(snap.val()) cb(snap.val()); }),
  webrtcOnAnswer: (player, cb) => onValue(child(ref(_db, `quizstage/webrtc/${sanitiseKey(player)}`), 'answer'), snap => { if(snap.val()) cb(snap.val()); }),
  webrtcOnCandidates: (player, side, cb) => onChildAdded(child(ref(_db, `quizstage/webrtc/${sanitiseKey(player)}`), side), snap => { if(snap.val()) cb(snap.val()); }),
  webrtcOnAnyPresence: (cb) => onValue(ref(_db, 'quizstage/webrtc'), snap => {
    const val = snap.val(); if(!val) return;
    Object.entries(val).forEach(([key, data]) => { if(data && data.present) cb(key); });
  })
};
window.dispatchEvent(new Event('fb-ready'));
</script>

<style>
/* Simplified CSS for brevity - keep your existing styles from the original file here */
:root{--gold:#F5C842;--deep:#0A0A14;--accent:#5B4CFF;--text:#E8E8F0;--danger:#E74C3C;}
body{background:var(--deep);color:var(--text);font-family:'DM Sans',sans-serif;}
.screen{display:none; padding: 20px;}
.screen.active{display:block;}
.buzz-btn{width:200px;height:200px;border-radius:50%;background:var(--danger);color:#fff;font-family:'Bebas Neue';font-size:40px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin: 50px auto;}
.video-container{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:10px;}
video{width:100%;background:#000;border-radius:10px;}
</style>
</head>
<body>

<div id="lobby" class="screen active">
  <h1>Lobby</h1>
  <button onclick="launchProjection()">Launch Projection</button>
</div>

<div id="game-fast" class="screen">
  <div class="buzz-btn" onclick="handleBuzz()">BUZZ</div>
</div>

<div id="projection" class="screen">
  <h1>Live Projection</h1>
  <div id="video-grid" class="video-container"></div>
</div>

<script>
let S = { game: {}, me: null };

// --- FIX 1: Ensure Launch Projection triggers Game Start ---
function launchProjection() {
  const newState = {
    status: 'active',
    mode: 'fast', // or 'normal'
    curQ: 0,
    buzzed: null
  };
  window._fb.pushGame(newState);
  go('projection');
  initProjectionReceiver();
}

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// --- FIX 2: WebRTC Receiver Logic for Admin/Projection ---
const pcs = {};
function initProjectionReceiver() {
  window._fb.webrtcOnAnyPresence(async (playerKey) => {
    if (pcs[playerKey]) return; // Already connected

    const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    pcs[playerKey] = pc;

    // Create video element for player
    let vid = document.getElementById('vid-' + playerKey);
    if (!vid) {
      vid = document.createElement('video');
      vid.id = 'vid-' + playerKey;
      vid.autoplay = true;
      vid.playsinline = true;
      document.getElementById('video-grid').appendChild(vid);
    }

    pc.ontrack = (e) => { vid.srcObject = e.streams[0]; };

    // ICE Handling
    pc.onicecandidate = ({candidate}) => {
      if(candidate) window._fb.webrtcAddCandidate(playerKey, 'answerCandidates', candidate.toJSON());
    };
    window._fb.webrtcOnCandidates(playerKey, 'offerCandidates', (c) => pc.addIceCandidate(new RTCIceCandidate(c)));

    // Handle the Offer
    window._fb.webrtcOnOffer(playerKey, async (offer) => {
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      window._fb.webrtcSendAnswer(playerKey, { type: answer.type, sdp: answer.sdp });
    });
  });
}

// --- FIX 3: Sync Player View (Buzz Button) ---
window.addEventListener('fb-ready', () => {
  window._fb.onGame(game => {
    if (!game) return;
    S.game = game;
    
    if (game.status === 'active') {
      if (game.mode === 'fast') go('game-fast');
      else go('game-normal');
    }
  });
});

function handleBuzz() {
  window._fb.buzzIn(Date.now());
}
</script>
</body>
</html>
